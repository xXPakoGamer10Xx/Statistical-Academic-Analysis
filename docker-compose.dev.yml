name: academia-stats-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: academia
      POSTGRES_USER: academia
      POSTGRES_PASSWORD: academia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academia -d academia"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://academia:academia_dev@postgres:5432/academia
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev_secret_min_32_chars_xxxxxxxxxxxxx
      ENVIRONMENT: development
      DEBUG: "true"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost"
      INITIAL_ADMIN_EMAIL: admin@universidad.edu
      INITIAL_ADMIN_PASSWORD: admin12345
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - uploads_dev:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=1
    environment:
      DATABASE_URL: postgresql://academia:academia_dev@postgres:5432/academia
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev_secret_min_32_chars_xxxxxxxxxxxxx
    volumes:
      - ./backend/app:/app/app
      - uploads_dev:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_dev_data:
  uploads_dev:
  frontend_node_modules:
