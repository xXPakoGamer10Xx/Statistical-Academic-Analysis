server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/x-javascript text/javascript;
    gzip_min_length 1024;

    client_max_body_size 250M;

    # Proxy a backend FastAPI
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 250M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache estáticos
    location ~* \.(js|css|svg|woff2?|ttf|png|jpg|jpeg|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
